<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1f" />
  <meta name="description" content="Orbit — a calmer, more luminous social experience." />
  <title>Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="screens.css" />

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <!-- Boot loader (shown until Firebase auth resolves) -->
  <div id="boot" class="boot">
    <div class="boot-orbit">
      <div class="boot-ring"></div>
      <div class="boot-ring boot-ring-2"></div>
      <div class="boot-core"></div>
    </div>
    <p class="boot-label">Orbit</p>
  </div>

  <!-- Auth screen -->
  <section id="auth-screen" class="screen auth-screen hidden">
    <div class="auth-stars" aria-hidden="true"></div>
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-mark"><span class="brand-mark-core"></span></div>
        <h1 class="brand-name">Orbit</h1>
        <p class="brand-tag">A calmer place to share light.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab is-active" data-auth-tab="signin">Sign in</button>
        <button class="auth-tab" data-auth-tab="signup">Create account</button>
      </div>

      <form id="auth-form" class="auth-form" autocomplete="on">
        <div class="field" data-only="signup">
          <label for="auth-name">Display name</label>
          <input id="auth-name" type="text" placeholder="What should we call you?" autocomplete="name" />
        </div>
        <div class="field" data-only="signup">
          <label for="auth-handle">Handle</label>
          <div class="handle-input">
            <span>@</span>
            <input id="auth-handle" type="text" placeholder="yourhandle" autocomplete="username" />
          </div>
        </div>
        <div class="field">
          <label for="auth-email">Email</label>
          <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="auth-pass">Password</label>
          <input id="auth-pass" type="password" placeholder="At least 6 characters" autocomplete="current-password" required />
        </div>

        <button type="submit" id="auth-submit" class="btn btn-primary btn-block">
          <span class="btn-label">Sign in</span>
          <span class="btn-spinner hidden"></span>
        </button>

        <div class="auth-divider"><span>or</span></div>

        <button type="button" id="google-btn" class="btn btn-ghost btn-block">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="#EA4335" d="M12 11v3.2h4.5c-.2 1.2-1.4 3.5-4.5 3.5-2.7 0-4.9-2.2-4.9-5s2.2-5 4.9-5c1.5 0 2.6.6 3.2 1.2l2.2-2.1C16 5.4 14.2 4.6 12 4.6 7.9 4.6 4.6 7.9 4.6 12s3.3 7.4 7.4 7.4c4.3 0 7.1-3 7.1-7.2 0-.5-.1-.9-.1-1.2H12z"/></svg>
          Continue with Google
        </button>

        <p class="auth-error" id="auth-error"></p>
      </form>
    </div>
  </section>

  <!-- App shell -->
  <section id="app-shell" class="app-shell hidden">
    <!-- Sidebar (desktop) -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark sm"><span class="brand-mark-core"></span></div>
        <span class="brand-name sm">Orbit</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#/stream" class="nav-item" data-route="stream">
          <i data-lucide="sparkles"></i><span>Stream</span>
        </a>
        <a href="#/flicks" class="nav-item" data-route="flicks">
          <i data-lucide="play-circle"></i><span>Flicks</span>
        </a>
        <a href="#/circles" class="nav-item" data-route="circles">
          <i data-lucide="users-round"></i><span>Circles</span>
        </a>
        <a href="#/signals" class="nav-item" data-route="signals">
          <i data-lucide="message-square"></i><span>Signals</span>
          <span class="badge nav-badge hidden" id="nav-signals-badge">0</span>
        </a>
        <a href="#/notifications" class="nav-item" data-route="notifications">
          <i data-lucide="bell"></i><span>Notifications</span>
          <span class="badge nav-badge hidden" id="nav-notif-badge">0</span>
        </a>
        <a href="#/profile" class="nav-item" data-route="profile">
          <i data-lucide="user"></i><span>Profile</span>
        </a>
        <a href="#/settings" class="nav-item" data-route="settings">
          <i data-lucide="settings"></i><span>Settings</span>
        </a>
      </nav>
      <button class="btn btn-primary btn-compose" id="btn-compose">
        <i data-lucide="feather"></i><span>Compose Beam</span>
      </button>
      <button class="btn btn-ghost btn-block theme-toggle-btn" id="btn-theme" data-theme-toggle title="Toggle theme">
        <i data-lucide="sun"></i><span>Toggle theme</span>
      </button>
      <div class="sidebar-me" id="sidebar-me"></div>
    </aside>

    <!-- Main view router -->
    <main class="view" id="view"></main>

    <!-- Mobile bottom nav -->
    <nav class="bottom-nav">
      <a href="#/stream" class="bn-item" data-route="stream"><i data-lucide="sparkles"></i></a>
      <a href="#/flicks" class="bn-item" data-route="flicks"><i data-lucide="play-circle"></i></a>
      <button class="bn-compose" id="bn-compose" aria-label="Compose"><i data-lucide="feather"></i></button>
      <a href="#/signals" class="bn-item" data-route="signals"><i data-lucide="message-square"></i><span class="dot hidden" id="bn-signals-dot"></span></a>
      <a href="#/profile" class="bn-item" data-route="profile"><i data-lucide="user"></i></a>
    </nav>
  </section>

  <!-- Modal root -->
  <div id="modal-root" class="modal-root"></div>

  <!-- Sheet root (bottom sheet / drawer) -->
  <div id="sheet-root" class="sheet-root"></div>

  <!-- Context menu root -->
  <div id="ctx-root" class="ctx-root"></div>

  <!-- Toasts -->
  <div id="toasts" class="toasts" aria-live="polite"></div>

  <!-- App entry -->
  <script type="module" src="app.js"></script>
</body>
</html>
